<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Jokerian</title>

<style>
    @font-face {
        font-family: "Myriad Pro";
        src: local("Myriad Pro");
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    html, body {
        height: 100%;
        overflow: hidden;
    }

    body {
        background: url("QR background-03-03.jpg") no-repeat center center fixed;
        background-size: cover;
        background-color: #f5f5f5;
        font-family: "Myriad Pro", Arial, sans-serif;
        color: #190635;
    }

    /* MAIN CONTAINER - Perfectly centered content */
    .main-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;      /* Horizontal center */
        justify-content: center;  /* Vertical center */
        height: 100vh;
        width: 100vw;
        position: relative;
        text-align: center;       /* Centers all text content */
    }

    /* CONTENT CLUSTER - Everything centered */
    .content-cluster {
        display: flex;
        flex-direction: column;
        align-items: center;      /* Center all children horizontally */
        text-align: center;
        z-index: 2;
        max-width: 700px;
        padding: 0 20px;
    }

    .logo-image {
        width: 350px;            /* Fixed size as per your original */
        height: auto;
        margin-bottom: 20px;
    }

    h1 {
        font-size: 40px;         /* Your exact size */
        font-weight: 600;
        margin-bottom: 15px;
        font-family: "Britannic Bold", sans-serif;
        line-height: 1.2;
        text-align: center;
    }

    p {
        font-size: 25px;         /* Your exact size */
        line-height: 1.5;
        max-width: 550px;
        margin-bottom: 30px;
        text-align: center;
    }

    /* FOLLOW SECTION - Centered under text */
    .follow-section {
        margin-top: 20px;
    }

    .follow-section h2 {
        font-size: 25px;         /* Your exact size */
        font-weight: 700;
        font-family: "Britannic Bold", sans-serif;
        margin-bottom: 20px;
        text-align: center;
    }

    .btn-row {
        display: flex;
        justify-content: center; /* Center buttons */
        gap: 30px;
        margin-bottom: 15px;
        flex-wrap: wrap;
    }

    .btn {
        padding: 12px 24px;
        font-size: 15px;         /* Your exact size */
        font-weight: 600;
        border-radius: 25px;
        cursor: pointer;
        text-decoration: none;
        color: white;
        display: flex;
        align-items: center;
        gap: 10px;
        transition: transform 0.3s ease;
        white-space: nowrap;
    }

    .btn img {
        width: 24px;
        height: 24px;
        object-fit: contain;
    }

    .instagram {
        background: linear-gradient(45deg, #f9a825, #e91e63, #9c27b0);
    }

    .tiktok {
        background: #0a0014;
    }

    .btn:hover {
        transform: scale(1.05);
    }

    /* COPYRIGHT - Directly under buttons, centered */
    .copyright {
        font-size: 14px;
        opacity: 0.9;
        margin-top: 10px;
        text-align: center;
    }

    /* KIDS GRAPHIC - Large, positioned right as decorative element */
    .right-image {
        position: absolute;
        right: 5%;               /* Position from right edge */
        top: 50%;
        transform: translateY(-50%); /* Perfect vertical center */
        width: 50vw;             /* Large but responsive */
        max-width: 700px;
        height: auto;
        max-height: 80vh;        /* Prevent overflow */
        object-fit: contain;
        z-index: 1;
        pointer-events: none;    /* Let clicks pass through */
    }

    /* TABLET ADJUSTMENTS - Move graphic below content */
    @media (max-width: 1024px) {
        .main-wrapper {
            justify-content: flex-start;
            padding-top: 5vh;
        }

        .content-cluster {
            max-width: 90vw;
        }

        .right-image {
            position: relative;
            right: auto;
            top: auto;
            transform: none;
            width: 80vw;
            max-width: 500px;
            margin-top: 30px;
        }

        .logo-image {
            width: 300px;
        }

        h1 {
            font-size: 36px;
        }

        p {
            font-size: 22px;
        }
    }

    /* MOBILE */
    @media (max-width: 600px) {
        .main-wrapper {
            padding-top: 3vh;
        }

        .logo-image {
            width: 250px;
        }

        h1 {
            font-size: 28px;
        }

        p {
            font-size: 18px;
            margin-bottom: 20px;
        }

        .follow-section h2 {
            font-size: 20px;
        }

        .btn {
            padding: 10px 20px;
            font-size: 14px;
        }

        .right-image {
            width: 90vw;
            margin-top: 20px;
        }
    }

    /* SMALL MOBILE */
    @media (max-width: 380px) {
        h1 {
            font-size: 24px;
        }

        p {
            font-size: 16px;
        }

        .btn {
            padding: 8px 16px;
            font-size: 13px;
        }
    }

    /* LANDSCAPE MOBILE - Side by side */
    @media (max-height: 600px) and (orientation: landscape) {
        .main-wrapper {
            flex-direction: row;
            justify-content: center;
            gap: 5vw;
            padding: 2vh 5vw;
        }

        .content-cluster {
            max-width: 45vw;
        }

        .right-image {
            position: relative;
            width: 40vw;
            max-height: 85vh;
        }

        .logo-image {
            width: 180px;
        }

        h1 {
            font-size: 24px;
        }

        p {
            font-size: 16px;
        }
    }
</style>

</head>

<body>

<div class="main-wrapper">
    <!-- CENTERED CONTENT CLUSTER -->
    <div class="content-cluster">
        <img src="Logosocial media-04-04.png" class="logo-image" alt="Jokerian Visual">
        
        <h1>Smart Fun for Every Age<br>Anytime, Anywhere</h1>
        
        <p>
            Jokerian brings back real, screen-free entertainment through joyful, beautifully designed books,
            games and puzzles crafted with love to spark curiosity and smiles.
        </p>

        <!-- FOLLOW SECTION + COPYRIGHT GROUPED TOGETHER -->
        <div class="follow-section">
            <h2>FOLLOW US & BE OUR FIRST HERO</h2>
            
            <div class="btn-row">
                <a href="https://www.instagram.com/jokerianuniverse/" class="btn instagram" target="_blank" rel="noopener">
                    <img src="Insta-05.png" alt="Instagram">
                    INSTAGRAM
                </a>
                
                <a href="https://www.tiktok.com/@jokerianuniverse" class="btn tiktok" target="_blank" rel="noopener">
                    <img src="Tiktok-05.png" alt="TikTok">
                    TIKTOK
                </a>
            </div>
            
            <!-- COPYRIGHT DIRECTLY UNDER BUTTONS -->
            <div class="copyright">© Jokerian • All Rights Reserved</div>
        </div>
    </div>

    <!-- KIDS GRAPHIC - Positioned absolutely on right for desktop -->
    <img src="kids-02.png" class="right-image" alt="Kids Graphic">
</div>

</body>
</html>
