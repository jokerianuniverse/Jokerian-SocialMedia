<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Jokerian</title>

<style>
    @font-face {
        font-family: "Myriad Pro";
        src: local("Myriad Pro");
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    html, body {
        height: 100%;
        overflow: hidden;
    }

    body {
        background: url("QR background-03-03.jpg") no-repeat center center fixed;
        background-size: cover;
        background-color: #f5f5f5;
        font-family: "Myriad Pro", Arial, sans-serif;
        color: #190635;
    }

    /* MAIN CONTAINER - Full viewport, centered content */
    .main-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center; /* Centers vertically */
        height: 100vh;
        width: 100vw;
        position: relative;
        padding: 2vh 4vw;
    }

    /* CONTENT AREA - Logo, Text, Buttons, Copyright grouped together */
    .content-cluster {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        z-index: 2;
        max-width: 600px;
    }

    .logo-image {
        width: min(70vw, 350px);
        height: auto;
        margin-bottom: 2vh;
    }

    h1 {
        font-size: 40px; /* Preserved as requested */
        font-weight: 600;
        margin-bottom: 2vh;
        font-family: "Britannic Bold", sans-serif;
        line-height: 1.2;
    }

    p {
        font-size: 25px; /* Preserved as requested */
        line-height: 1.5;
        max-width: 550px;
        margin-bottom: 3vh;
    }

    /* FOLLOW SECTION - Tightly grouped */
    .follow-section {
        margin-top: 2vh;
    }

    .follow-section h2 {
        font-size: 25px; /* Preserved as requested */
        font-weight: 700;
        font-family: "Britannic Bold", sans-serif;
        margin-bottom: 2vh;
    }

    .btn-row {
        display: flex;
        justify-content: center;
        gap: 2vw;
        margin-bottom: 1.5vh;
        flex-wrap: wrap;
    }

    .btn {
        padding: 12px 24px;
        font-size: 15px; /* Preserved as requested */
        font-weight: 600;
        border-radius: 25px;
        cursor: pointer;
        text-decoration: none;
        color: white;
        display: flex;
        align-items: center;
        gap: 10px;
        transition: transform 0.3s ease;
        white-space: nowrap;
    }

    .btn img {
        width: 24px;
        height: 24px;
        object-fit: contain;
    }

    .instagram {
        background: linear-gradient(45deg, #f9a825, #e91e63, #9c27b0);
    }

    .tiktok {
        background: #0a0014;
    }

    .btn:hover {
        transform: scale(1.05);
    }

    /* COPYRIGHT - Directly under buttons, compact */
    .copyright {
        font-size: 14px;
        opacity: 0.9;
        margin-top: 1vh;
        text-align: center;
    }

    /* KIDS GRAPHIC - Large, positioned right, overlapping background */
    .right-image {
        position: absolute;
        right: 5vw;
        top: 50%;
        transform: translateY(-50%);
        width: min(55vw, 700px); /* Much larger */
        height: auto;
        max-height: 85vh; /* Prevent overflow */
        object-fit: contain;
        z-index: 1;
        pointer-events: none;
    }

    /* TABLET ADJUSTMENTS */
    @media (max-width: 1024px) {
        .main-wrapper {
            justify-content: flex-start; /* Stack from top on smaller screens */
            padding-top: 3vh;
        }

        .content-cluster {
            max-width: 90vw;
        }

        .right-image {
            position: relative; /* Remove absolute positioning */
            right: auto;
            top: auto;
            transform: none;
            width: min(80vw, 500px);
            max-height: 35vh;
            margin-top: 2vh;
        }

        h1 {
            font-size: 32px;
        }

        p {
            font-size: 20px;
        }

        .follow-section h2 {
            font-size: 20px;
        }
    }

    /* MOBILE */
    @media (max-width: 600px) {
        .main-wrapper {
            justify-content: flex-start;
            padding-top: 2vh;
        }

        .logo-image {
            width: 200px;
        }

        h1 {
            font-size: 26px;
        }

        p {
            font-size: 16px;
            margin-bottom: 2vh;
        }

        .follow-section h2 {
            font-size: 18px;
        }

        .btn {
            padding: 10px 18px;
            font-size: 13px;
        }

        .btn img {
            width: 20px;
            height: 20px;
        }

        .right-image {
            width: 85vw;
            max-height: 30vh;
        }

        .copyright {
            font-size: 12px;
        }
    }

    /* DESKTOP LARGE SCREENS - Maximize graphic */
    @media (min-width: 1400px) {
        .right-image {
            width: min(50vw, 800px);
            right: 8vw;
        }
    }

    /* LANDSCAPE MOBILE - Side by side compact */
    @media (max-height: 600px) and (orientation: landscape) {
        .main-wrapper {
            flex-direction: row;
            justify-content: space-between;
            padding: 2vh 4vw;
        }

        .content-cluster {
            align-items: flex-start;
            text-align: left;
            max-width: 45vw;
        }

        .right-image {
            position: relative;
            width: 45vw;
            max-height: 80vh;
        }

        h1 {
            font-size: 24px;
        }

        p {
            font-size: 16px;
        }
    }
</style>

</head>

<body>

<div class="main-wrapper">
    <!-- CENTERED CONTENT CLUSTER -->
    <div class="content-cluster">
        <img src="Logosocial media-04-04.png" class="logo-image" alt="Jokerian Visual">
        
        <h1>Smart Fun for Every Age<br>Anytime, Anywhere</h1>
        
        <p>
            Jokerian brings back real, screen-free entertainment through joyful, beautifully designed books,
            games and puzzles crafted with love to spark curiosity and smiles.
        </p>

        <!-- FOLLOW SECTION + COPYRIGHT GROUPED TOGETHER -->
        <div class="follow-section">
            <h2>FOLLOW US & BE OUR FIRST HERO</h2>
            
            <div class="btn-row">
                <a href="https://www.instagram.com/jokerianuniverse/" class="btn instagram" target="_blank" rel="noopener">
                    <img src="Insta-05.png" alt="Instagram">
                    INSTAGRAM
                </a>
                
                <a href="https://www.tiktok.com/@jokerianuniverse" class="btn tiktok" target="_blank" rel="noopener">
                    <img src="Tiktok-05.png" alt="TikTok">
                    TIKTOK
                </a>
            </div>
            
            <!-- COPYRIGHT DIRECTLY UNDER BUTTONS -->
            <div class="copyright">© Jokerian • All Rights Reserved</div>
        </div>
    </div>

    <!-- LARGE KIDS GRAPHIC - Positioned right on desktop, below on mobile -->
    <img src="kids-02.png" class="right-image" alt="Kids Graphic">
</div>

</body>
</html>
