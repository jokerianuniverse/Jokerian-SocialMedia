<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Jokerian</title>

<style>
    body {
        margin: 0;
        font-family: "Myriad Pro", Arial, sans-serif;
        color: #190635;
        background: white;
    }

    /* MAIN LAYOUT */
    .main {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 60px 8%;
        gap: 40px;
        min-height: 80vh;
    }

    /* LEFT CONTENT */
    .left {
        max-width: 600px;
    }

    .logo-image {
        width: 300px;
        margin-bottom: 20px;
    }

    h1 {
        font-size: 42px;
        font-weight: 600;
        margin-bottom: 20px;
        font-family: "Britannic Bold";
    }

    p {
        font-size: 20px;
        line-height: 1.6;
    }

    /* RIGHT IMAGE */
    .right img {
        width: 100%;
        max-width: 600px;
    }

    /* FOLLOW SECTION */
    .follow-section {
        text-align: center;
        margin: 60px 20px;
    }

    .follow-section h2 {
        font-size: 24px;
        margin-bottom: 20px;
        font-family: "Britannic Bold";
    }

    .btn-row {
        display: flex;
        justify-content: center;
        gap: 20px;
        flex-wrap: wrap;
    }

    .btn {
        padding: 10px 18px;
        font-size: 14px;
        font-weight: 600;
        border-radius: 12px;
        text-decoration: none;
        color: white;
        display: flex;
        align-items: center;
        gap: 8px;
        transition: 0.3s;
    }

    .btn img {
        width: 22px;
        height: 22px;
    }

    .instagram {
        background: linear-gradient(45deg, #f9a825, #e91e63, #9c27b0);
    }

    .tiktok {
        background: #0a0014;
    }

    .btn:hover {
        transform: scale(1.05);
    }

    h6 {
        text-align: center;
        margin: 30px 0;
        font-size: 12px;
    }

    /* 📱 MOBILE RESPONSIVE */
    @media (max-width: 900px) {

        .main {
            flex-direction: column;
            text-align: center;
        }

        .left {
            max-width: 100%;
        }

        .logo-image {
            width: 220px;
        }

        h1 {
            font-size: 28px;
        }

        p {
            font-size: 16px;
        }

        .right img {
            max-width: 350px;
        }
    }

</style>
</head>

<body>

<!-- MAIN SECTION -->
<div class="main">

    <!-- LEFT -->
    <div class="left">
        <img src="Logosocial media-04-04.png" class="logo-image" alt="Logo">

        <h1>
            Smart Fun for Every Age<br>
            Anytime, Anywhere
        </h1>

        <p>
            Jokerian brings back real, screen-free entertainment through joyful,
            beautifully designed books, games and puzzles crafted with love to
            spark curiosity and smiles.
        </p>
    </div>

    <!-- RIGHT -->
    <div class="right">
        <img src="kids-02.png" alt="Kids Graphic">
    </div>

</div>

<!-- FOLLOW SECTION -->
<div class="follow-section">
    <h2>FOLLOW US & BE OUR FIRST HERO</h2>

    <div class="btn-row">
        <a href="https://www.instagram.com/jokerianuniverse/" class="btn instagram">
            <img src="Insta-05.png" alt="">
            INSTAGRAM
        </a>

        <a href="https://www.tiktok.com/@jokerianuniverse" class="btn tiktok">
            <img src="Tiktok-05.png" alt="">
            TIKTOK
        </a>
    </div>
</div>

<h6>© Jokerian • All Rights Reserved</h6>

</body>
</html>
