<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Jokerian</title>

<style>
    @font-face {
        font-family: "Myriad Pro";
        src: local("Myriad Pro");
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    html, body {
        height: 100%;
        overflow: hidden;
    }

    body {
        background: url("QR background-03-03.jpg") no-repeat center center fixed;
        background-size: cover;
        background-color: #f5f5f5;
        font-family: "Myriad Pro", Arial, sans-serif;
        color: #190635;
    }

    /* MAIN CONTAINER - Full screen, centered vertically */
    .main-wrapper {
        display: flex;
        flex-direction: row;          /* Side by side layout */
        align-items: center;        /* Vertical center */
        justify-content: center;      /* Horizontal center for whole layout */
        height: 100vh;
        width: 100vw;
        position: relative;
        gap: 5vw;                   /* Space between text and image */
        padding: 0 5vw;
    }

    /* CONTENT AREA - Left side, left-aligned text, but not too left */
    .content-area {
        display: flex;
        flex-direction: column;
        align-items: flex-start;    /* Left align children */
        text-align: left;           /* Left align text */
        max-width: 550px;           /* Constrain width so it's not too wide */
        z-index: 2;
    }

    .logo-image {
        width: 350px;
        height: auto;
        margin-bottom: 20px;
    }

    h1 {
        font-size: 40px;
        font-weight: 600;
        margin-bottom: 15px;
        font-family: "Britannic Bold", sans-serif;
        line-height: 1.2;
        text-align: left;
    }

    p {
        font-size: 25px;
        line-height: 1.5;
        margin-bottom: 30px;
        text-align: left;
    }

    /* FOLLOW SECTION - Left aligned under text */
    .follow-section {
        margin-top: 10px;
        width: 100%;
    }

    .follow-section h2 {
        font-size: 25px;
        font-weight: 700;
        font-family: "Britannic Bold", sans-serif;
        margin-bottom: 20px;
        text-align: left;
    }

    .btn-row {
        display: flex;
        justify-content: flex-start; /* Left align buttons */
        gap: 20px;
        margin-bottom: 15px;
        flex-wrap: wrap;
    }

    .btn {
        padding: 12px 24px;
        font-size: 15px;
        font-weight: 600;
        border-radius: 25px;
        cursor: pointer;
        text-decoration: none;
        color: white;
        display: flex;
        align-items: center;
        gap: 10px;
        transition: transform 0.3s ease;
        white-space: nowrap;
    }

    .btn img {
        width: 24px;
        height: 24px;
        object-fit: contain;
    }

    .instagram {
        background: linear-gradient(45deg, #f9a825, #e91e63, #9c27b0);
    }

    .tiktok {
        background: #0a0014;
    }

    .btn:hover {
        transform: scale(1.05);
    }

    /* COPYRIGHT - Left aligned under buttons */
    .copyright {
        font-size: 14px;
        opacity: 0.9;
        margin-top: 10px;
        text-align: left;
    }

    /* KIDS GRAPHIC - Right side, large */
    .right-image {
        width: 45vw;
        max-width: 650px;
        height: auto;
        max-height: 75vh;
        object-fit: contain;
        z-index: 1;
    }

    /* TABLET - Stack vertically but keep left alignment */
    @media (max-width: 1024px) {
        .main-wrapper {
            flex-direction: column;
            justify-content: flex-start;
            padding-top: 3vh;
            gap: 3vh;
        }

        .content-area {
            align-items: center;    /* Center on mobile */
            text-align: center;
            max-width: 90vw;
        }

        h1, p, .follow-section h2, .copyright {
            text-align: center;
        }

        .btn-row {
            justify-content: center;
        }

        .right-image {
            width: 70vw;
            max-width: 450px;
        }

        .logo-image {
            width: 280px;
        }

        h1 {
            font-size: 32px;
        }

        p {
            font-size: 20px;
        }
    }

    /* MOBILE */
    @media (max-width: 600px) {
        .main-wrapper {
            padding-top: 2vh;
        }

        .logo-image {
            width: 220px;
        }

        h1 {
            font-size: 26px;
        }

        p {
            font-size: 17px;
            margin-bottom: 20px;
        }

        .follow-section h2 {
            font-size: 20px;
        }

        .btn {
            padding: 10px 18px;
            font-size: 14px;
        }

        .right-image {
            width: 80vw;
        }
    }

    /* LANDSCAPE MOBILE - Side by side compact */
    @media (max-height: 600px) and (orientation: landscape) {
        .main-wrapper {
            flex-direction: row;
            padding: 2vh 4vw;
        }

        .content-area {
            align-items: flex-start;
            text-align: left;
            max-width: 45vw;
        }

        h1, p, .follow-section h2, .copyright {
            text-align: left;
        }

        .btn-row {
            justify-content: flex-start;
        }

        .logo-image {
            width: 160px;
        }

        h1 {
            font-size: 22px;
        }

        p {
            font-size: 15px;
        }

        .right-image {
            width: 40vw;
        }
    }
</style>

</head>

<body>

<div class="main-wrapper">
    <!-- LEFT CONTENT AREA - Left aligned but contained -->
    <div class="content-area">
        <img src="Logosocial media-04-04.png" class="logo-image" alt="Jokerian Visual">
        
        <h1>Smart Fun for Every Age<br>Anytime, Anywhere</h1>
        
        <p>
            Jokerian brings back real, screen-free entertainment through joyful, beautifully designed books,
            games and puzzles crafted with love to spark curiosity and smiles.
        </p>

        <!-- FOLLOW SECTION + COPYRIGHT -->
        <div class="follow-section">
            <h2>FOLLOW US & BE OUR FIRST HERO</h2>
            
            <div class="btn-row">
                <a href="https://www.instagram.com/jokerianuniverse/" class="btn instagram" target="_blank" rel="noopener">
                    <img src="Insta-05.png" alt="Instagram">
                    INSTAGRAM
                </a>
                
                <a href="https://www.tiktok.com/@jokerianuniverse" class="btn tiktok" target="_blank" rel="noopener">
                    <img src="Tiktok-05.png" alt="TikTok">
                    TIKTOK
                </a>
            </div>
            
            <div class="copyright">© Jokerian • All Rights Reserved</div>
        </div>
    </div>

    <!-- RIGHT SIDE KIDS GRAPHIC -->
    <img src="kids-02.png" class="right-image" alt="Kids Graphic">
</div>

</body>
</html>
