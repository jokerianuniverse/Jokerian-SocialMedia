<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Jokerian</title>

<style>
    @font-face {
        font-family: "Myriad Pro";
        src: local("Myriad Pro");
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    html, body {
        height: 100%;
        overflow: hidden;
    }

    body {
        background: url("QR background-03-03.jpg") no-repeat center center fixed;
        background-size: cover;
        background-color: #f5f5f5;
        font-family: "Myriad Pro", Arial, sans-serif;
        color: #190635;
    }

    /* MAIN CONTAINER - Full screen */
    .main-wrapper {
        display: flex;
        flex-direction: column;
        height: 100vh;
        width: 100vw;
        position: relative;
        padding: 4vh 5vw;
    }

    /* TOP SECTION - Left aligned */
    .top-section {
        display: flex;
        flex-direction: column;
        align-items: flex-start;    /* Left align */
        text-align: left;
        max-width: 600px;
        z-index: 2;
        margin-bottom: 3vh;
    }

    .logo-image {
        width: 350px;
        height: auto;
        margin-bottom: 20px;
    }

    h1 {
        font-size: 40px;
        font-weight: 600;
        margin-bottom: 15px;
        font-family: "Britannic Bold", sans-serif;
        line-height: 1.2;
        text-align: left;
    }

    p {
        font-size: 25px;
        line-height: 1.5;
        text-align: left;
    }

    /* BOTTOM SECTION - Centered at bottom */
    .bottom-section {
        margin-top: auto;           /* Push to bottom */
        margin-bottom: 3vh;         /* Space from bottom */
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;        /* Center everything */
        z-index: 2;
    }

    .follow-section h2 {
        font-size: 25px;
        font-weight: 700;
        font-family: "Britannic Bold", sans-serif;
        margin-bottom: 20px;
        text-align: center;
    }

    .btn-row {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-bottom: 15px;
        flex-wrap: wrap;
    }

    .btn {
        padding: 12px 24px;
        font-size: 15px;
        font-weight: 600;
        border-radius: 25px;
        cursor: pointer;
        text-decoration: none;
        color: white;
        display: flex;
        align-items: center;
        gap: 10px;
        transition: transform 0.3s ease;
        white-space: nowrap;
    }

    .btn img {
        width: 24px;
        height: 24px;
        object-fit: contain;
    }

    .instagram {
        background: linear-gradient(45deg, #f9a825, #e91e63, #9c27b0);
    }

    .tiktok {
        background: #0a0014;
    }

    .btn:hover {
        transform: scale(1.05);
    }

    .copyright {
        font-size: 14px;
        opacity: 0.9;
        text-align: center;
    }

    /* KIDS GRAPHIC - Positioned on right, middle area */
    .right-image {
        position: absolute;
        right: 5%;
        top: 45%;
        transform: translateY(-50%);
        width: 45vw;
        max-width: 600px;
        height: auto;
        max-height: 70vh;
        object-fit: contain;
        z-index: 1;
        pointer-events: none;
    }

    /* TABLET */
    @media (max-width: 1024px) {
        .main-wrapper {
            padding: 3vh 4vw;
        }

        .top-section {
            max-width: 90vw;
        }

        .right-image {
            position: relative;
            right: auto;
            top: auto;
            transform: none;
            width: 70vw;
            max-width: 450px;
            margin: 2vh auto;
        }

        .logo-image {
            width: 280px;
        }

        h1 {
            font-size: 32px;
        }

        p {
            font-size: 20px;
        }
    }

    /* MOBILE */
    @media (max-width: 600px) {
        .main-wrapper {
            padding: 2vh 3vw;
            overflow-y: auto;
        }

        .logo-image {
            width: 220px;
        }

        h1 {
            font-size: 26px;
        }

        p {
            font-size: 17px;
        }

        .follow-section h2 {
            font-size: 20px;
        }

        .btn {
            padding: 10px 18px;
            font-size: 14px;
        }

        .right-image {
            width: 80vw;
        }
    }

    /* LANDSCAPE MOBILE */
    @media (max-height: 600px) and (orientation: landscape) {
        .main-wrapper {
            flex-direction: row;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
        }

        .top-section {
            flex: 0 1 45%;
            margin-bottom: 0;
        }

        .bottom-section {
            flex: 1 1 100%;
            margin-top: 2vh;
        }

        .right-image {
            flex: 0 1 50%;
            position: relative;
            right: auto;
            top: auto;
            transform: none;
            width: 45vw;
        }

        .logo-image {
            width: 160px;
        }

        h1 {
            font-size: 22px;
        }

        p {
            font-size: 15px;
        }
    }
</style>

</head>

<body>

<div class="main-wrapper">
    <!-- TOP SECTION - LEFT ALIGNED -->
    <div class="top-section">
        <img src="Logosocial media-04-04.png" class="logo-image" alt="Jokerian Visual">
        
        <h1>Smart Fun for Every Age<br>Anytime, Anywhere</h1>
        
        <p>
            Jokerian brings back real, screen-free entertainment through joyful, beautifully designed books,
            games and puzzles crafted with love to spark curiosity and smiles.
        </p>
    </div>

    <!-- KIDS GRAPHIC - Right side -->
    <img src="kids-02.png" class="right-image" alt="Kids Graphic">

    <!-- BOTTOM SECTION - CENTERED -->
    <div class="bottom-section">
        <div class="follow-section">
            <h2>FOLLOW US & BE OUR FIRST HERO</h2>
            
            <div class="btn-row">
                <a href="https://www.instagram.com/jokerianuniverse/" class="btn instagram" target="_blank" rel="noopener">
                    <img src="Insta-05.png" alt="Instagram">
                    INSTAGRAM
                </a>
                
                <a href="https://www.tiktok.com/@jokerianuniverse" class="btn tiktok" target="_blank" rel="noopener">
                    <img src="Tiktok-05.png" alt="TikTok">
                    TIKTOK
                </a>
            </div>
            
            <div class="copyright">© Jokerian • All Rights Reserved</div>
        </div>
    </div>
</div>

</body>
</html>
