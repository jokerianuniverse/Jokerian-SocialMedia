<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Jokerian</title>

<style>
    @font-face {
        font-family: "Myriad Pro";
        src: local("Myriad Pro");
    }

    body {
        margin: 0;
        padding: 0;
        background: white;
        font-family: "Myriad Pro", Arial, sans-serif;
        color: #190635;
        text-align: center;
    }

    /* HERO SECTION */
    .hero {
        padding: 40px 20px;
    }

    /* LOGO */
    .logo-image {
        width: 100%;
        max-width: 300px;
    }

    /* IMAGE */
    .right-image {
        width: 100%;
        max-width: 500px;

        /* 🎯 Adjust position here */
        margin-top: 20px;
        transform: translateY(10px); /* change value if needed */
    }

    /* HEADLINE */
    h1 {
        font-size: clamp(36px, 6vw, 60px);
        font-family: "Britannic Bold";
        margin: 20px 0;
        line-height: 1.2;
    }

    /* PARAGRAPH */
    p {
        font-size: clamp(18px, 2.5vw, 26px);
        max-width: 700px;
        margin: auto;
        line-height: 1.6;
    }

    /* FOLLOW SECTION */
    .follow-section {
        margin-top: 50px;
        padding: 20px;
    }

    .follow-section h2 {
        font-size: clamp(20px, 3vw, 28px);
        font-family: "Britannic Bold";
        margin-bottom: 20px;
    }

    .btn-row {
        display: flex;
        justify-content: center;
        gap: 20px;
        flex-wrap: wrap;
    }

    .btn {
        padding: 10px 20px;
        font-size: 14px;
        font-weight: 600;
        border-radius: 20px;
        text-decoration: none;
        color: white;
        display: flex;
        align-items: center;
        gap: 10px;
        transition: 0.3s;
    }

    .btn img {
        width: 24px;
        height: 24px;
    }

    .instagram {
        background: linear-gradient(45deg, #f9a825, #e91e63, #9c27b0);
    }

    .tiktok {
        background: #0a0014;
    }

    .btn:hover {
        transform: scale(1.05);
    }

    /* FOOTER */
    h6 {
        margin: 20px;
        font-size: 12px;
    }

    /* MOBILE TUNING */
    @media (max-width: 768px) {
        .right-image {
            max-width: 85%;
        }
    }

</style>
</head>

<body>

<div class="hero">

    <!-- LOGO -->
    <img src="Logosocial media-04-04.png" class="logo-image" alt="Jokerian Logo">

    <!-- IMAGE -->
    <img src="kids-02.png" class="right-image" alt="Kids Graphic">

    <!-- TEXT UNDER IMAGE -->
    <h1>
        Smart Fun for Every Age<br>
        Anytime, Anywhere
    </h1>

    <p>
        Jokerian brings back real, screen-free entertainment through joyful, beautifully designed books,
        games and puzzles crafted with love to spark curiosity and smiles.
    </p>

</div>

<!-- FOLLOW SECTION -->
<div class="follow-section">
    <h2>FOLLOW US & BE OUR FIRST HERO</h2>

    <div class="btn-row">

        <a href="https://www.instagram.com/jokerianuniverse/" class="btn instagram">
            <img src="Insta-05.png" alt="Instagram">
            INSTAGRAM
        </a>

        <a href="https://www.tiktok.com/@jokerianuniverse" class="btn tiktok">
            <img src="Tiktok-05.png" alt="TikTok">
            TIKTOK
        </a>

    </div>
</div>

<!-- FOOTER -->
<h6>© Jokerian • All Rights Reserved</h6>

</body>
</html>
